monitor=,preferred,auto,auto
monitor=DP-3,preferred,0x0,1,bitdepth, 10
monitor=eDP-1,preferred,960x2160,1,bitdepth, 10

env = WLR_EGL_NO_MODIFIER,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GTK_IM_MODULE,simple
env = QT_IM_MODULE,simple
env = XWAYLAND_NO_GLAMOR,1
env = HYPRCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,30
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = AQ_DRM_DEVICES=,/dev/dri/card0

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = uwsm app -- hypridle &
exec-once = uwsm app -- hyprlauncher -d &
exec-once = uwsm app -- hyprpaper &
exec-once = uwsm app -- hyprsunset &
exec-once = uwsm app -- $HOME/.local/bin/hyprpolkitagent &
exec-once = uwsm app -- waybar &
exec-once = uwsm app -- swaync &
exec-once = $HOME/.config/hypr/scripts/xdg-portal-hyprland.sh & 
exec-once = $HOME/.config/hypr/scripts/btconnect.sh & 

permission = /usr/bin/hyprpm, plugin, allow

input {
    kb_layout = us
    kb_variant = intl
    # kb_model = 
    kb_options = caps:escape
    # kb_rules = 

    follow_mouse = 0
    float_switch_override_focus = 0

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0.3 
    accel_profile = "adaptive"
}

binds {
    workspace_back_and_forth = true
    drag_threshold = 10
}

cursor {
    inactive_timeout  = 5
    hide_on_key_press = true
    hide_on_touch = true
    warp_on_change_workspace = true
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 3
    col.active_border = rgb(FFA500)

    layout = dwindle
    allow_tearing = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 1
    font_family = JetBrainsMono Nerd Font
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

quirks {
    prefer_hdr = 1
} 

decoration {
    rounding = false
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

master {
    new_status=master
}

xwayland {
  force_zero_scaling = true
}

windowrule = match:float false, opacity 1.0 0.8 1.0
windowrule = match:float true, opacity 1.0 0.8 1.0
windowrule = match:fullscreen true, opacity 1.0 
windowrule = match:class ^(librewolf|firefox-esr|chromium|SheetCamTNG-dev|librewolf|[kK]i[cC]ad|pcb_calculator|eeschema|gerbview|pcbnew|bitmap2component|FreeCAD|Tor Browser|soffice)$, opacity 1.0
windowrule = match:class ^([kK]i[cC]ad|bitmap2component|pcb_calculator|Tor Browser|virt-manager|qt.ct|nwg-look|xdg-desktop-portal*|org.remmina.Remmina)$, float true, center true
windowrule = match:class ^([eE]lectrum|feather)$, float true, size 800 400, center true
windowrule = match:class ^(io.bassi.Amberol|xdg-desktop-portal-gtk)$, float true, size 1200 1000, center true
windowrule = match:class (org.gnupg.pinentry-qt), float true, center true
windowrule = match:title ^(Moonlight|chiaki-ng|Open File|OnionShare)$, float true
windowrule = match:title ^(ghostty)$, opacity 0.9 0.8 1.0
windowrule = match:title ^(tmux)$, opacity 1.0
windowrule = match:title ^(galc|nmtui|bluetuith|pass|wiremix|display)$, float true, size 800 600, center true
windowrule = match:title ^(ghostty|yazi|Open File|chiaki-ng)$, float true, size 1200 1000, center true 

workspace=1,monitor:DP-3
workspace=2,monitor:DP-3
workspace=3,monitor:DP-3
workspace=4,monitor:DP-3
workspace=5,monitor:DP-3
workspace=6,monitor:eDP-1
workspace=7,monitor:eDP-1
workspace=8,monitor:eDP-1

$mainMod = SUPER

bind = $mainMod, A, exec, flatpak run io.bassi.Amberol
bind = $mainMod, B, exec, librewolf -P ricardo
bind = $mainMod SHIFT, B, exec, librewolf -P firma
bind = $mainMod, C, exec, ghostty --title=galc -e qalc
bind = $mainMod, E, exec, ghostty --title=yazi -e yazi
bind = $mainMod, F, fullscreen 
bind = $mainMod, G, cyclenext, floating
bind = $mainMod SHIFT, G, togglefloating 
bind = $mainMod SHIFT, G, centerwindow
bind = $mainMod SHIFT, G, resizeactive, exact 1200 1000
bind = $mainMod SHIFT, Q, killactive, 
bind = $mainMod, O, exec, libreoffice --quickstart --nolockcheck
bind = $mainMod, P, exec, ghostty --title=pass -e pass ff
bind = $mainMod SHIFT, P, exec, ghostty --title=pass -e pass 2fa
bind = $mainMod, T, exec, ghostty 
bind = $mainMod MOD5, T, exec, ghostty --title=ghostty
bind = $mainMod SHIFT, T, exec, ghostty --title=tmux -e $HOME/.config/hypr/scripts/tmux.sh
bind = $mainMod, V, exec, ghostty --title=ghostty -e nvim
bind = $mainMod SHIFT, X, exec, $HOME/.config/hypr/scripts/logout.sh
bind = $mainMod, W, exec, [fullscreen] librewolf -P whatsapp --kiosk https://web.whatsapp.com
bind = $mainMod, RETURN, exec, hyprlauncher
bindl= ,switch:Lid Switch, exec, systemctl suspend
bind = ,XF86PowerOff, exec, wlogout -P eDP-1 -m 400
bind = ,Print, exec, $HOME/.config/hypr/scripts/screenshot.sh
bind = ,XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
binde = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -1%
binde = SHIFT,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -10%
binde = ,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +1%
binde = SHIFT,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +10%
bind = ,XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind = ,XF86AudioPlay, exec, playerctl play-pause
bind = ,XF86AudioPause, exec, playerctl pause
bind = ,XF86AudioNext, exec, playerctl next
bind = ,XF86AudioPrev, exec, playerctl previous
binde = ,XF86MonBrightnessDown, exec, brightnessctl set 10%-
binde = SHIFT,XF86MonBrightnessDown, exec, $HOME/.config/hypr/scripts/brigtness_lg.sh - 10
binde = ,XF86MonBrightnessUp, exec, brightnessctl set 10%+
binde = SHIFT,XF86MonBrightnessUp, exec, $HOME/.config/hypr/scripts/brigtness_lg.sh + 10

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, r, centerwindow
bind = $mainMod SHIFT, r, resizeactive, exact 1200 1000

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

$workspaceMod = MOD5

bind = $workspaceMod, a, workspace, 1
bind = $workspaceMod, s, workspace, 2
bind = $workspaceMod, d, workspace, 3
bind = $workspaceMod, f, workspace, 4
bind = $workspaceMod, g, workspace, 5
bind = $workspaceMod, h, workspace, 6
bind = $workspaceMod, j, workspace, 7
bind = $workspaceMod, k, workspace, 8

bind = $workspaceMod SHIFT, a, movetoworkspace, 1
bind = $workspaceMod SHIFT, s, movetoworkspace, 2
bind = $workspaceMod SHIFT, d, movetoworkspace, 3
bind = $workspaceMod SHIFT, f, movetoworkspace, 4
bind = $workspaceMod SHIFT, g, movetoworkspace, 5
bind = $workspaceMod SHIFT, h, movetoworkspace, 6
bind = $workspaceMod SHIFT, j, movetoworkspace, 7
bind = $workspaceMod SHIFT, k, movetoworkspace, 8
