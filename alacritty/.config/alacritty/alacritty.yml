window:
  dimensions:
    columns: 100
    lines: 30

mouse:
  hide_when_typing: true

cursor:
  style: Block
  unfocused_hollow: true

scrolling:
  history: 10000
  multiplier: 5

font:
  normal:
    family: JetBrainsMono Nerd Font
    style: normal
  italic:
    family: JetBrainsMono Nerd Font
    style: italic
  bold:
    family: JetBrainsMono Nerd Font
    style: bold
  size: 12

selection:
  semantic_escape_chars: ',│`|:"'' ()[]{}<>'
  save_to_clipboard: false

draw_bold_text_with_bright_colors: true
live_config_reload: true

